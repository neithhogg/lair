name: Check skill updates

on:
  schedule:
    - cron: '0 9 * * 1'  # weekly, Monday 09:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Update skills
        run: npx skills update -y

      - name: Open PR if changes detected
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update skills-lock.json'
          title: 'chore: upstream skill updates available'
          body: |
            Automated weekly check detected upstream skill updates.

            Review the `skills-lock.json` diff and merge to adopt updates.
          branch: chore/skill-updates
          delete-branch: true
