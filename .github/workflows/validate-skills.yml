name: Validate skills

on:
  pull_request:
    paths:
      - 'skills/**/SKILL.md'
      - 'scripts/skill-schema.json'
      - 'scripts/validate-skills.js'
      - 'package.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Validate skill frontmatter
        run: npm run validate

      - name: Check evals exist for user-invocable skills
        run: |
          for skill in project-init project-sync; do
            if [ ! -d "skills/$skill/evals" ]; then
              echo "FAIL: skills/$skill/evals/ missing — run /skill-creator before merging"
              exit 1
            fi
          done
          echo "OK: eval directories present"
